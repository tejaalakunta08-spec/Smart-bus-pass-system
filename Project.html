<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Bus Pass System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- LIBRARIES -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:url("https://images.unsplash.com/photo-1509749837427-ac94a2553d0e") center/cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:95%;
max-width:900px;
background:rgba(255,255,255,0.95);
padding:20px;
border-radius:10px;
}

input,select,button{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#667eea;
color:white;
border:none;
cursor:pointer;
}

.section{display:none;margin-top:15px;}

.pass{
border:1px solid #ccc;
padding:15px;
margin-top:15px;
border-radius:8px;
}

#map{height:300px;margin-top:10px;}

.adminBox{
background:#fff4e6;
padding:10px;
border-radius:8px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>🎫 Smart Bus Pass System</h2>

<!-- LOGIN -->

<div id="loginSection">

<h3>Login</h3>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>New student?</p>
<button onclick="showRegister()">Register</button>

</div>

<!-- REGISTER -->

<div id="registerSection" style="display:none">

<h3>Student Registration</h3>

<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">

<button onclick="register()">Register</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard" style="display:none">

<button onclick="showSection('newPass')">Generate Pass</button>
<button onclick="showSection('viewPass')">View Pass</button>
<button onclick="showSection('location')">Live Bus</button>

<button id="adminBtn" onclick="showSection('admin')" style="display:none">
Admin Dashboard
</button>

<button onclick="logout()">Logout</button>

<!-- CREATE PASS -->

<div id="newPass" class="section">

<h3>Create Bus Pass</h3>

<input id="name" placeholder="Student Name">
<input id="roll" placeholder="Roll Number">
<input id="route" placeholder="Route">

<select id="fare">
<option value="">Stops</option>
<option value="300">1-5 Stops ₹300</option>
<option value="500">6-10 Stops ₹500</option>
<option value="700">11-15 Stops ₹700</option>
<option value="900">16+ Stops ₹900</option>
</select>

<input type="file" id="photo">

<button onclick="createPass()">Generate Pass</button>

</div>

<!-- VIEW PASS -->

<div id="viewPass" class="section">

<input id="searchID" placeholder="Enter Pass ID">
<button onclick="fetchPass()">Search</button>

<div id="result"></div>

</div>

<!-- ADMIN -->

<div id="admin" class="section adminBox">

<h3>Admin Dashboard</h3>

<button onclick="showAllPasses()">View All Passes</button>

<h4>QR Scan Verification</h4>

<div id="reader" style="width:300px"></div>

<div id="verifyResult"></div>

<div id="allPasses"></div>

</div>

<!-- MAP -->

<div id="location" class="section">

<h3>Live Bus Tracking</h3>

<div id="map"></div>

</div>

</div>

</div>

<script>

/* DATABASE */

function getUsers(){
return JSON.parse(localStorage.getItem("users")||"[]")
}

function saveUsers(u){
localStorage.setItem("users",JSON.stringify(u))
}

function getPasses(){
return JSON.parse(localStorage.getItem("passes")||"[]")
}

function savePasses(p){
localStorage.setItem("passes",JSON.stringify(p))
}

/* DEFAULT ADMIN */

let users=getUsers()

if(users.length===0){
users.push({username:"admin",password:"admin",role:"admin"})
saveUsers(users)
}

/* REGISTER */

function register(){

let u=regUser.value
let p=regPass.value

if(!u||!p){
alert("Fill details")
return
}

let users=getUsers()

users.push({username:u,password:p,role:"student"})

saveUsers(users)

alert("Registered")

registerSection.style.display="none"
loginSection.style.display="block"

}

/* SHOW REGISTER */

function showRegister(){
loginSection.style.display="none"
registerSection.style.display="block"
}

/* LOGIN */

let currentUser=null

function login(){

let u=loginUser.value
let p=loginPass.value

let user=getUsers().find(x=>x.username===u && x.password===p)

if(!user){
alert("Invalid Login")
return
}

currentUser=user

loginSection.style.display="none"
dashboard.style.display="block"

if(user.role==="admin"){
adminBtn.style.display="block"
}

}

/* LOGOUT */

function logout(){
location.reload()
}

/* NAVIGATION */

function showSection(id){

document.querySelectorAll(".section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

if(id==="location") loadMap()

if(id==="admin") startScanner()

}

/* CREATE PASS */

function createPass(){

let nameVal=document.getElementById("name").value
let rollVal=document.getElementById("roll").value
let routeVal=document.getElementById("route").value
let fareVal=document.getElementById("fare").value

let file=document.getElementById("photo").files[0]

if(!nameVal||!rollVal||!routeVal||!fareVal){
alert("Fill all fields")
return
}

let reader=new FileReader()

reader.onload=function(){

let id="BP"+Date.now()

let issue=new Date()

let expiry=new Date()

expiry.setDate(issue.getDate()+30)

let pass={
id:id,
name:nameVal,
roll:rollVal,
route:routeVal,
fare:fareVal,
expiry:expiry.toISOString().split("T")[0],
photo:reader.result
}

let passes=getPasses()

passes.push(pass)

savePasses(passes)

alert("Pass Generated: "+id)

fetchPassById(id)

}

reader.readAsDataURL(file)

}

/* FETCH PASS */

function fetchPass(){
fetchPassById(searchID.value)
}

function fetchPassById(id){

let pass=getPasses().find(p=>p.id===id)

if(!pass){
alert("Pass not found")
return
}

result.innerHTML=`

<div class="pass" id="passCard">

<img src="${pass.photo}" width="100"><br>

<b>ID:</b> ${pass.id}<br>
<b>Name:</b> ${pass.name}<br>
<b>Roll:</b> ${pass.roll}<br>
<b>Route:</b> ${pass.route}<br>
<b>Fare:</b> ₹${pass.fare}<br>
<b>Expiry:</b> ${pass.expiry}

<div id="qr"></div>

<button onclick="printPass()">Print</button>
<button onclick="downloadPDF()">PDF</button>

</div>

`

new QRCode(document.getElementById("qr"),pass.id)

}

/* ADMIN VIEW */

function showAllPasses(){

let passes=getPasses()

let html=""

passes.forEach(p=>{
html+=`<div>${p.id} - ${p.name}</div>`
})

allPasses.innerHTML=html

}

/* QR SCANNER */

function startScanner(){

const qr=new Html5Qrcode("reader")

qr.start(
{ facingMode: "environment" },
{ fps:10, qrbox:250 },
msg=>{

verifyPass(msg)

}
)

}

function verifyPass(id){

let pass=getPasses().find(p=>p.id===id)

if(pass){
verifyResult.innerHTML="✅ Valid Pass: "+pass.name
}else{
verifyResult.innerHTML="❌ Invalid Pass"
}

}

/* PRINT */

function printPass(){

let content=document.getElementById("passCard").innerHTML

let win=window.open()

win.document.write(content)

win.print()

}

/* PDF */

function downloadPDF(){
html2pdf().from(document.getElementById("passCard")).save("BusPass.pdf")
}

/* MAP */

function loadMap(){

let map=L.map('map').setView([17.385044,78.486671],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let bus=L.marker([17.385044,78.486671]).addTo(map)

let lat=17.385044
let lng=78.486671

setInterval(()=>{

lat+=0.001
lng+=0.001

bus.setLatLng([lat,lng])

},2000)

}

</script>

</body>
</html>
